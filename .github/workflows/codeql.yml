# CodeQL code scanning for this repository's Python source.
#
# Python is interpreted, so no build step is required: the `python` matrix
# entry uses `build-mode: none` and CodeQL analyzes the source directly.
#
# This workflow also satisfies the repository ruleset that requires Code
# Scanning results before a PR can merge: because it triggers on
# `pull_request`, the PR that introduces this file produces its own results.
name: "CodeQL"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly, off-peak (Wednesday 03:17 UTC) to avoid a load spike at :00.
    - cron: '17 3 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # required for all workflows
      security-events: write
      # required to fetch internal or private CodeQL packs
      packages: read
      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
