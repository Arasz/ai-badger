[tool.pylint.main]
# jsonschema is a real runtime dependency (see scripts/requirements.txt). Some lint
# environments run without it installed, which would otherwise spuriously raise
# import-error (E0401) on `import jsonschema`.
ignored-modules = ["jsonschema"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint."messages control"]
disable = [
    # C0413 wrong-import-position: every ai-badger script does `sys.path.insert(...)` —
    # directly, or via a local `_bootstrap_lib()` helper — BEFORE `import badger_lib` /
    # `import tracker_lib`, so the shared lib resolves relative to the script regardless of
    # where the plugin is installed. This intentionally violates "imports at the top of the
    # file": for a script with no fixed install location, the path-setup IS the top.
    "wrong-import-position",

    # R0801 duplicate-code: the tiny `_bootstrap_lib()` helper and small argparse/stdin
    # boilerplate are intentionally repeated across standalone scripts. Each script must stay
    # self-contained (no shared import beyond badger_lib/tracker_lib) so it keeps working
    # wherever it's copied, so this "duplication" is a deliberate deployability property, not
    # debt to refactor away.
    "duplicate-code",

    # R09xx complexity thresholds (too-many-locals/branches/return-statements/
    # instance-attributes/arguments/positional-arguments): style thresholds, not correctness.
    # Refactoring working, tested pipeline/CLI/hook logic purely to satisfy an arbitrary count
    # is out of scope for a lint cleanup pass and risks behavior changes.
    "too-many-locals",
    "too-many-branches",
    "too-many-return-statements",
    "too-many-instance-attributes",
    "too-many-arguments",
    "too-many-positional-arguments",
    "too-many-statements",

    # E0401 import-error: hook scripts in skills/task/scripts/ bootstrap a shared lib
    # (tracker_lib / drift_notice) via sys.path in their _bootstrap_lib() helper, not
    # via a package install. pylint running standalone can't resolve these imports.
    "import-error",

    # Test-specific conventions that don't apply to production code:
    # C0116 missing-function-docstring — test names carry intent
    # C0115 missing-class-docstring — test helper classes don't need docs
    # C0301 line-too-long — parameterized test strings get long
    # C0304 missing-final-newline — trivial formattin gnuisance
    # C0325 superfluous-parens — fixture unpacking reads better with parens
    # C0411 wrong-import-order — test imports with sys.path setup
    # C0415 import-outside-toplevel — conditional test imports
    # C1803 use-implicit-booleaness-not-comparison — explicit comparisons for clarity
    # R0903 too-few-public-methods — test helper classes
    # R1732 consider-using-with — subprocess mocks don't need with
    # W0212 protected-access — test helper access
    # W0611 unused-import — conditional test imports
    # W0612 unused-variable — destructuring test fixtures
    # W0613 unused-argument — fixture injection (capsys, tmp_path)
    # W0621 redefined-outer-name — fixture reuse pattern
    # W0622 redefined-builtin — mocking builtins
    "missing-function-docstring",
    "missing-class-docstring",
    "line-too-long",
    "missing-final-newline",
    "superfluous-parens",
    "wrong-import-order",
    "import-outside-toplevel",
    "use-implicit-booleaness-not-comparison",
    "too-few-public-methods",
    "consider-using-with",
    "protected-access",
    "unused-import",
    "unused-variable",
    "unused-argument",
    "redefined-outer-name",
    "redefined-builtin",
]

[tool.pytest.ini_options]
# Framework tests live ONLY in the top-level tests/ dir — never under features/ or skills/ — so
# scaffold.py never copies them into a target repo's .ai-badger/. See docs/scripts.md.
testpaths = ["tests"]